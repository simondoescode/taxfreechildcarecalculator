<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>UK Tax-Free Childcare Calculator | Estimate Your Government Top-Up</title>
    <meta name="description" content="Use our free UK Tax-Free Childcare calculator to work out exactly how much you need to pay into your account, and how much the government will contribute.">
    <meta name="keywords" content="tax-free childcare calculator, UK childcare gov top-up, childcare costs, government contribution calculator, HMRC childcare">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://yourwebsite.com/calculator" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="UK Tax-Free Childcare Calculator">
    <meta property="og:description" content="Calculate your government childcare top-up instantly. Find out how much to pay into your childcare account.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Hide number input arrows for a cleaner look */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>

    <!-- Schema.org Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Tax-Free Childcare Calculator",
      "description": "A tool to calculate the UK government's 20% top-up for childcare costs.",
      "applicationCategory": "CalculatorApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "GBP"
      }
    }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-200 h-screen overflow-hidden flex items-center justify-center p-4 antialiased text-slate-800">

    <main class="bg-white rounded-[2rem] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] max-w-lg w-full p-5 sm:p-7 border border-slate-100 max-h-full overflow-y-auto flex flex-col">
        
        <header class="mb-4 flex-shrink-0">
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-slate-900 mb-1.5">
                Tax-Free Childcare Calculator
            </h1>
            <p class="text-slate-500 leading-relaxed text-sm">
                Calculate exactly how much you need to deposit to get the maximum UK government contribution toward your childcare costs.
            </p>
        </header>

        <!-- Input Form -->
        <form class="space-y-4 flex-shrink-0" onsubmit="event.preventDefault();">
            
            <!-- Total amount payable -->
            <div class="group">
                <label for="total" class="block text-sm font-semibold text-slate-700 mb-1">
                    Total bill from Childcare Provider
                </label>
                <div class="relative transition-shadow duration-300 rounded-xl group-focus-within:ring-4 group-focus-within:ring-indigo-100">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="text-slate-400 font-semibold text-lg">£</span>
                    </div>
                    <input type="number" id="total" min="0" step="0.01" placeholder="0.00" 
                           class="pl-10 w-full bg-slate-50 border border-slate-200 text-slate-900 font-medium rounded-xl py-2 px-4 focus:outline-none focus:border-indigo-500 focus:bg-white transition-all text-lg"
                           aria-label="Total amount payable to Childcare Provider">
                </div>
            </div>

            <!-- Allowance Input with Toggle -->
            <div class="group">
                <div class="flex justify-between items-end mb-1.5">
                    <label id="allowanceLabel" for="allowanceInput" class="block text-sm font-semibold text-slate-700">
                        Allowance remaining <span class="font-normal text-slate-400">(This period)</span>
                    </label>
                </div>

                <!-- Segmented Toggle -->
                <div class="flex bg-slate-100 p-1 rounded-lg mb-2 border border-slate-200">
                    <button type="button" id="btnRemaining" onclick="setMode('remaining')" class="flex-1 text-xs py-1.5 rounded-md bg-white shadow-sm font-semibold text-slate-800 transition-all">Remaining</button>
                    <button type="button" id="btnUsed" onclick="setMode('used')" class="flex-1 text-xs py-1.5 rounded-md text-slate-500 font-medium hover:text-slate-800 transition-all">Amount Used</button>
                </div>

                <div class="relative transition-shadow duration-300 rounded-xl group-focus-within:ring-4 group-focus-within:ring-indigo-100">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="text-slate-400 font-semibold text-lg">£</span>
                    </div>
                    <input type="number" id="allowanceInput" min="0" step="0.01" placeholder="0.00" 
                           class="pl-10 w-full bg-slate-50 border border-slate-200 text-slate-900 font-medium rounded-xl py-2 px-4 focus:outline-none focus:border-indigo-500 focus:bg-white transition-all text-lg"
                           aria-label="Government allowance status">
                </div>
            </div>

            <!-- Disabled Child Toggle (Hidden by default) -->
            <div id="disabledToggleContainer" class="hidden items-start p-2.5 bg-slate-50 rounded-xl border border-slate-100 hover:bg-slate-100 transition-colors cursor-pointer" onclick="document.getElementById('disabled').click()">
                <div class="flex items-center h-5 mt-0.5">
                    <input id="disabled" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 rounded cursor-pointer accent-indigo-600">
                </div>
                <div class="ml-3 text-sm flex-1">
                    <label for="disabled" class="font-semibold text-slate-800 cursor-pointer pointer-events-none">Child is disabled</label>
                    <p class="text-slate-500 mt-0.5 text-xs pointer-events-none">Increases max gov top-up to £1,000 per 3 months.</p>
                </div>
            </div>
        </form>

        <!-- Output Results (Premium High-Contrast Card) -->
        <section aria-live="polite" class="mt-5 bg-gradient-to-br from-indigo-900 to-slate-800 rounded-2xl p-5 shadow-inner border border-indigo-700 text-white relative overflow-hidden flex-shrink-0">
            
            <!-- Decorative background element -->
            <div class="absolute top-0 right-0 -mr-16 -mt-16 w-40 h-40 rounded-full bg-indigo-500 opacity-20 blur-3xl"></div>

            <div class="relative z-10">
                
                <!-- You Need To Pay Section -->
                <div class="mb-3 flex justify-between items-center">
                    <div>
                        <h2 class="text-[11px] font-bold text-indigo-300 uppercase tracking-widest mb-1">You need to pay</h2>
                        <output id="userPays" class="block text-3xl sm:text-4xl font-extrabold tracking-tight">£0.00</output>
                    </div>
                    
                    <!-- Copy Button -->
                    <button onclick="copyAmount()" id="copyBtn" class="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-indigo-800/60 border border-indigo-600 hover:bg-indigo-700 hover:border-indigo-400 text-indigo-200 hover:text-white transition-all focus:outline-none focus:ring-2 focus:ring-indigo-400" title="Copy exact amount">
                        <svg id="copyIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" />
                        </svg>
                        <span id="copyText" class="text-[11px] font-bold tracking-wide uppercase">Copy</span>
                    </button>
                </div>
                
                <div class="pt-3 border-t border-indigo-700/50">
                    <h2 class="text-[11px] font-bold text-indigo-300 uppercase tracking-widest mb-1">Government will add</h2>
                    <output id="govPays" class="block text-xl sm:text-2xl font-bold text-indigo-100">£0.00</output>
                </div>
            </div>
        </section>

        <!-- GOV.UK Sign In Link -->
        <div class="mt-4 text-center flex-shrink-0">
            <a href="https://www.gov.uk/sign-in-childcare-account" target="_blank" rel="noopener noreferrer" 
               class="inline-flex items-center justify-center gap-2 text-sm font-semibold text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50 transition-colors py-2 px-4 rounded-lg">
                Sign in to your Childcare Account
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                </svg>
            </a>
        </div>

    </main>

    <!-- Core Logic Script -->
    <script>
        const totalInput = document.getElementById('total');
        const allowanceInput = document.getElementById('allowanceInput');
        const disabledToggle = document.getElementById('disabled');
        const disabledToggleContainer = document.getElementById('disabledToggleContainer');
        const allowanceLabel = document.getElementById('allowanceLabel');
        const btnRemaining = document.getElementById('btnRemaining');
        const btnUsed = document.getElementById('btnUsed');
        
        let isRemainingMode = true; // Default state

        // Handles copying the amount to clipboard
        function copyAmount() {
            const amountText = document.getElementById('userPays').innerText;
            // Strip the '£' and commas so it's a clean number for banking apps (e.g., "150.00")
            const cleanNumber = amountText.replace(/£|,/g, '').trim();

            navigator.clipboard.writeText(cleanNumber).then(() => {
                const btn = document.getElementById('copyBtn');
                const icon = document.getElementById('copyIcon');
                const text = document.getElementById('copyText');

                // Visual feedback
                btn.classList.add('text-green-400', 'border-green-500', 'bg-green-900/40');
                btn.classList.remove('text-indigo-200', 'border-indigo-600', 'bg-indigo-800/60');
                
                // Swap to checkmark SVG
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />`;
                text.innerText = "Copied!";

                // Revert back after 2 seconds
                setTimeout(() => {
                    btn.classList.remove('text-green-400', 'border-green-500', 'bg-green-900/40');
                    btn.classList.add('text-indigo-200', 'border-indigo-600', 'bg-indigo-800/60');
                    
                    // Swap back to copy SVG
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" />`;
                    text.innerText = "Copy";
                }, 2000);
            });
        }

        // Handles switching between Remaining and Used modes
        function setMode(mode) {
            isRemainingMode = mode === 'remaining';
            
            if (isRemainingMode) {
                btnRemaining.className = "flex-1 text-xs py-1.5 rounded-md bg-white shadow-sm font-semibold text-slate-800 transition-all";
                btnUsed.className = "flex-1 text-xs py-1.5 rounded-md text-slate-500 font-medium hover:text-slate-800 transition-all";
                allowanceLabel.innerHTML = 'Allowance remaining <span class="font-normal text-slate-400">(This period)</span>';
                
                disabledToggleContainer.classList.add('hidden');
                disabledToggleContainer.classList.remove('flex');
            } else {
                btnUsed.className = "flex-1 text-xs py-1.5 rounded-md bg-white shadow-sm font-semibold text-slate-800 transition-all";
                btnRemaining.className = "flex-1 text-xs py-1.5 rounded-md text-slate-500 font-medium hover:text-slate-800 transition-all";
                allowanceLabel.innerHTML = 'Gov contribution used <span class="font-normal text-slate-400">(This period)</span>';
                
                disabledToggleContainer.classList.remove('hidden');
                disabledToggleContainer.classList.add('flex');
            }
            
            calculate();
        }

        function calculate() {
            // Retrieve and parse inputs
            const total = Math.max(0, parseFloat(totalInput.value) || 0);
            const allowanceInputValue = Math.max(0, parseFloat(allowanceInput.value) || 0);
            const isDisabled = disabledToggle.checked;
            
            let remainingGovAllowance = 0;

            // Determine actual remaining allowance based on the active mode
            if (isRemainingMode) {
                remainingGovAllowance = allowanceInputValue;
            } else {
                const maxGovAllowance = isDisabled ? 1000 : 500;
                remainingGovAllowance = Math.max(0, maxGovAllowance - allowanceInputValue);
            }
            
            // Government covers 20% of the total childcare bill
            let govContribution = total * 0.20;
            
            // Cap the contribution to the remaining allowance
            if (govContribution > remainingGovAllowance) {
                govContribution = remainingGovAllowance;
            }
            
            // Parent pays the remainder
            const userPays = total - govContribution;
            
            // Update UI with locale formatting for thousands separators
            document.getElementById('userPays').innerText = new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP' }).format(userPays);
            document.getElementById('govPays').innerText = new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP' }).format(govContribution);
        }

        // Formats input values to exactly 2 decimal places
        function formatToDecimals(event) {
            const input = event.target;
            const value = parseFloat(input.value);
            
            if (!isNaN(value)) {
                input.value = value.toFixed(2);
            }
            calculate();
        }

        // Real-time calculation as you type
        totalInput.addEventListener('input', calculate);
        allowanceInput.addEventListener('input', calculate);
        disabledToggle.addEventListener('change', calculate);

        // Format to decimals when the user clicks out of the input box
        totalInput.addEventListener('blur', formatToDecimals);
        allowanceInput.addEventListener('blur', formatToDecimals);
    </script>
</body>
</html>
